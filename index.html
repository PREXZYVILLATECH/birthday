<!DOCTYPE html>
<html lang="en">
<head>
  <title>Happy Birthday Nicky 💙</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue-1: #0a0e1a;
      --blue-2: #0d1b3e;
      --blue-3: #0c2461;
      --blue-4: #1a3a6b;
      --blue-5: #1e4d8c;
      --blue-light: #4a90d9;
      --blue-glow: #6ab0ff;
      --gold: #c9a84c;
      --white-soft: #e8edf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--blue-1);
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
      transition: background-color 6s ease;
      min-height: 100vh;
    }

    /* LOADING */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--blue-1);
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      transition: opacity 0.8s ease;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 60px; height: 60px;
      border: 3px solid rgba(100,170,255,0.15);
      border-top-color: #6ab0ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loader-text {
      color: #6ab0ff;
      font-family: 'Cinzel', serif;
      letter-spacing: 4px;
      font-size: 12px;
      opacity: 0.7;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* STARS */
    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    audio { display: none; }

    /* BALLOONS - Now just 3 balloons for HBD */
    .balloons {
      position: fixed;
      bottom: -220px;
      opacity: 0;
      z-index: 99;
      width: 90px;
      height: 170px;
      background-repeat: no-repeat;
      background-size: contain;
    }
    .balloons h2 {
      text-transform: uppercase;
      font-family: 'Cinzel', serif;
      font-size: 38px;
      text-shadow: 0 0 20px currentColor;
      display: none;
      text-align: center;
      line-height: 170px;
    }
    /* 3 balloons for HBD */
    #b1 { background-image: url('b1.png'); left: 15%; }
    #b2 { background-image: url('b2.png'); left: 45%; }
    #b3 { background-image: url('b3.png'); left: 75%; }

    .balloon-border {
      position: fixed;
      top: 100%;
      width: 100%;
      opacity: 0.4;
      z-index: 9999;
      transition: top 2s cubic-bezier(0.22,1,0.36,1);
    }
    .balloon-border.risen { top: 0; }

    /* MAIN */
    #main-container {
      position: relative;
      z-index: 10;
      display: none;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 20px 180px;
    }

    /* BULBS */
    .bulb-row {
      display: flex;
      justify-content: space-around;
      padding: 24px 0 0;
      position: relative;
      flex-wrap: wrap;
    }
    .bulb-row::before {
      content: '';
      position: absolute;
      top: 42px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(100,170,255,0.25), transparent);
    }
    .bulb {
      width: 42px; height: 42px;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      filter: brightness(0.25);
      transition: filter 0.6s ease;
    }
    .bulb.lit { filter: brightness(1); }
    .bulb-yellow.lit { filter: brightness(1) drop-shadow(0 0 10px #ffe066); }
    .bulb-red.lit    { filter: brightness(1) drop-shadow(0 0 10px #ff6666); }
    .bulb-blue.lit   { filter: brightness(1) drop-shadow(0 0 12px #66aaff); }
    .bulb-green.lit  { filter: brightness(1) drop-shadow(0 0 10px #66ffaa); }
    .bulb-pink.lit   { filter: brightness(1) drop-shadow(0 0 10px #ff99cc); }
    .bulb-orange.lit { filter: brightness(1) drop-shadow(0 0 10px #ffaa44); }

    /* BANNER */
    .banner-wrap {
      text-align: center;
      margin: 30px 0 10px;
      overflow: hidden;
    }
    .bannar {
      max-width: 85%;
      transform: translateY(-600px);
      transition: transform 1.4s cubic-bezier(0.34,1.56,0.64,1);
      filter: drop-shadow(0 8px 24px rgba(100,170,255,0.3));
    }
    .bannar.landed { transform: translateY(0); }

    /* DIVIDER */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 20px auto;
      max-width: 360px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
    }
    .divider-gem { color: #c9a84c; font-size: 15px; }

    /* CAKE - CENTERED */
    .cake-section {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 0 20px;
      width: 100%;
    }
    .cake {
      position: relative;
      display: none;
      width: 300px;
      height: 300px;
      margin: 0 auto;
    }
    .cake:after {
      background: rgba(255,255,255,0.9);
      border-radius: 300px;
      content: "";
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 300px; height: 6px;
    }
    .velas {
      background: rgba(255,255,255,1);
      border-radius: 100%;
      position: absolute;
      top: 50%; left: 50%;
      margin-left: -7px;
      margin-top: -25px;
      width: 14px; height: 50px;
    }
    .velas:after, .velas:before {
      background: rgba(100,170,255,0.5);
      content: "";
      position: absolute;
      width: 100%; height: 6px;
    }
    .velas:after  { top: 25%; left: 0; }
    .velas:before { top: 45%; left: 0; }
    .fuego {
      display: none;
      border-radius: 100%;
      box-shadow: 0 0 40px 10px rgba(248,233,209,0.2);
      position: absolute;
      top: -12px; left: 50%;
      margin-left: -10px;
      width: 20px; height: 38px;
    }
    .fuego:nth-child(1) { animation: fuego 2s infinite; }
    .fuego:nth-child(2) { animation: fuego 1.5s infinite; }
    .fuego:nth-child(3) { animation: fuego 1s infinite; }
    .fuego:nth-child(4) { animation: fuego 0.5s infinite; }
    .fuego:nth-child(5) { animation: fuego 0.2s infinite; }
    @keyframes fuego {
      0%   { background: rgba(254,248,97,0.6); transform: translateY(0) scale(1); }
      50%  { background: rgba(255,100,0,0.15); transform: translateY(-60px) scale(0); }
      100% { background: rgba(254,248,97,0.6); transform: translateY(0) scale(1); }
    }
    .cobertura {
      background: rgba(200,215,255,1);
      border-radius: 150px;
      position: absolute;
      top: 60%; left: 50%;
      margin-left: -84px;
      margin-top: -15px;
      width: 168px; height: 38px;
      z-index: 10;
      box-shadow: 0 4px 15px rgba(100,150,255,0.25);
    }
    .cobertura:after, .cobertura:before {
      background: rgba(200,215,255,1);
      border-radius: 300px;
      content: "";
      position: absolute;
      width: 15px; height: 30px;
    }
    .cobertura:after  { top: 20px; right: 43px; }
    .cobertura:before { top: 30px; right: 27px; }
    .bizcocho {
      background: linear-gradient(160deg, #0c2461, #1a3a6b);
      position: absolute;
      bottom: 0; left: 50%;
      margin-left: -75px;
      width: 150px; height: 100px;
      border-radius: 0 0 8px 8px;
    }
    .bizcocho:after, .bizcocho:before {
      background: rgba(200,220,255,0.25);
      content: "";
      position: absolute;
      width: 100%; height: 14px;
    }
    .bizcocho:after  { top: 30%; left: 0; }
    .bizcocho:before { top: 60%; left: 0; }

    /* MESSAGE - Typing effect style */
    .message-section {
      display: none;
      padding: 60px 10px 40px;
    }
    .message-header {
      text-align: center;
      margin-bottom: 44px;
    }
    .message-header h1 {
      font-family: 'Cinzel', serif;
      color: #c9a84c;
      font-size: clamp(26px, 5vw, 46px);
      letter-spacing: 6px;
      text-shadow: 0 0 30px rgba(201,168,76,0.45);
      margin-bottom: 10px;
    }
    .message-header .subtitle {
      color: #6ab0ff;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 20px;
      opacity: 0.75;
    }
    .message-card {
      background: linear-gradient(135deg, rgba(13,27,62,0.85), rgba(12,36,97,0.6));
      border: 1px solid rgba(100,170,255,0.18);
      border-radius: 16px;
      padding: 50px 46px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0,0,20,0.55), inset 0 1px 0 rgba(255,255,255,0.04);
      position: relative;
      overflow: hidden;
      min-height: 400px;
    }
    .message-card::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(100,170,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .message-line {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(18px, 2.4vw, 24px);
      color: #e8edf8;
      line-height: 1.95;
      display: none;
      opacity: 0;
      text-align: center;
      font-style: italic;
      font-weight: 300;
      transition: opacity 0.5s ease;
    }
    .message-line.strong {
      font-style: normal;
      font-weight: 600;
      color: #6ab0ff;
      font-size: clamp(20px, 3vw, 28px);
      letter-spacing: 0.5px;
    }
    .message-line.gold {
      color: #c9a84c;
      font-style: normal;
      font-size: clamp(22px, 3.5vw, 32px);
      font-family: 'Cinzel', serif;
      letter-spacing: 2px;
    }
    .message-line.visible {
      display: block;
      animation: fadeUp 0.6s ease forwards;
    }
    .message-line.hiding {
      animation: fadeDown 0.5s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-16px); display: none; }
    }
    .message-line.spacer { display: block; height: 18px; animation: none; opacity: 1; }

    .message-signature {
      text-align: center;
      margin-top: 36px;
      padding-top: 28px;
      border-top: 1px solid rgba(100,170,255,0.14);
      display: none;
    }
    .message-signature p {
      color: #6ab0ff;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 4px;
      opacity: 0.6;
    }

    /* PARTICLES */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 5;
      border-radius: 50%;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* CONTROL PANEL */
    .control-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(4,8,24,0.97), rgba(4,8,24,0.88));
      border-top: 1px solid rgba(100,170,255,0.12);
      padding: 14px 14px;
      z-index: 1000;
      backdrop-filter: blur(14px);
    }
    .buttons-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 780px;
      margin: 0 auto;
    }
    .btn-wish {
      background: transparent;
      border: 1px solid rgba(100,170,255,0.3);
      color: #6ab0ff;
      font-family: 'Cinzel', serif;
      font-size: 10.5px;
      letter-spacing: 1.5px;
      padding: 9px 15px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.28s ease;
      white-space: nowrap;
    }
    .btn-wish:hover {
      background: rgba(100,170,255,0.1);
      border-color: #6ab0ff;
      box-shadow: 0 0 14px rgba(100,170,255,0.18);
    }
    .btn-wish:disabled { opacity: 0.3; cursor: default; box-shadow: none; }
    .btn-wish.active {
      border-color: #c9a84c;
      color: #c9a84c;
      background: rgba(201,168,76,0.08);
    }

    /* Mobile responsive - Center cake */
    @media (max-width: 600px) {
      .message-card { padding: 28px 18px; }
      .btn-wish { font-size: 9.5px; padding: 8px 10px; }
      .cake-section {
        justify-content: center;
      }
      .cake {
        margin: 0 auto;
        left: 0;
      }
    }
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div id="loading-overlay">
  <div class="loader-ring"></div>
  <div class="loader-text">PREPARING SOMETHING SPECIAL</div>
</div>

<audio id="song" loop><source src="hbd.mp3"></audio>

<!-- 3 BALLOONS for HBD -->
<div class="balloons" id="b1"><h2 style="color:#6ab0ff;">H</h2></div>
<div class="balloons" id="b2"><h2 style="color:#c9a84c;">B</h2></div>
<div class="balloons" id="b3"><h2 style="color:#4a90d9;">D</h2></div>

<img src="Balloon-Border.png" class="balloon-border" id="balloon-border">

<div id="main-container">

  <div class="bulb-row">
    <div class="bulb bulb-yellow" style="background-image:url('bulb_yellow.png')"></div>
    <div class="bulb bulb-blue"   style="background-image:url('bulb_blue.png')"></div>
    <div class="bulb bulb-red"    style="background-image:url('bulb_red.png')"></div>
    <div class="bulb bulb-blue"   style="background-image:url('bulb_blue.png')"></div>
    <div class="bulb bulb-green"  style="background-image:url('bulb_green.png')"></div>
    <div class="bulb bulb-blue"   style="background-image:url('bulb_blue.png')"></div>
    <div class="bulb bulb-pink"   style="background-image:url('bulb_pink.png')"></div>
    <div class="bulb bulb-blue"   style="background-image:url('bulb_blue.png')"></div>
    <div class="bulb bulb-orange" style="background-image:url('bulb_orange.png')"></div>
  </div>

  <div class="banner-wrap">
    <img src="banner.png" class="bannar" id="banner-img">
  </div>

  <div class="divider"><span class="divider-gem">✦</span></div>

  <div class="cake-section">
    <div class="cake" id="the-cake">
      <div class="velas">
        <div class="fuego"></div><div class="fuego"></div>
        <div class="fuego"></div><div class="fuego"></div>
        <div class="fuego"></div>
      </div>
      <div class="cobertura"></div>
      <div class="bizcocho"></div>
    </div>
  </div>

  <div class="message-section" id="message-section">
    <div class="message-header">
      <h1>Happy Birthday</h1>
      <p class="subtitle">For someone truly irreplaceable</p>
    </div>
    <div class="divider"><span class="divider-gem">✦</span></div>
    <div class="message-card" id="message-card">
      <!-- Message lines will be shown one by one -->
      <div id="message-lines-container"></div>
      <div class="message-signature" id="msg-sig">
        <p>✦ &nbsp; MADE WITH LOVE, JUST FOR YOU &nbsp; ✦</p>
      </div>
    </div>
  </div>

</div>

<!-- CONTROL PANEL -->
<div class="control-panel">
  <div class="buttons-wrap">
    <button class="btn-wish" id="btn-lights">✦ Turn On Lights</button>
    <button class="btn-wish" id="btn-play"    style="display:none;">♪ Play Music</button>
    <button class="btn-wish" id="btn-banner"  style="display:none;">🎊 Let's Decorate</button>
    <button class="btn-wish" id="btn-balloons"style="display:none;">🎈 Fly With Balloons</button>
    <button class="btn-wish" id="btn-cake"    style="display:none;">🎂 Show the Cake</button>
    <button class="btn-wish" id="btn-candle"  style="display:none;">🕯 Light the Candle</button>
    <button class="btn-wish" id="btn-wish-btn"style="display:none;">💙 Happy Birthday</button>
    <button class="btn-wish" id="btn-message" style="display:none;">✉ A Message for You</button>
  </div>
</div>

<script>
/* STARS */
(function() {
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  let W, H, stars = [];
  function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
  function init() {
    stars = [];
    for (let i = 0; i < 200; i++) {
      stars.push({ x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.4+0.2, a: Math.random(),
        spd: Math.random()*0.007+0.002, d: Math.random()>0.5?1:-1 });
    }
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    stars.forEach(s => {
      s.a += s.spd*s.d;
      if (s.a>=1||s.a<=0.05) s.d*=-1;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(160,200,255,${s.a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); init(); draw();
  addEventListener('resize',()=>{resize();init();});
})();

/* PARTICLES */
function spawnParticles() {
  const clrs = ['rgba(100,170,255,0.6)','rgba(60,130,210,0.5)','rgba(201,168,76,0.5)','rgba(180,210,255,0.4)'];
  for (let i=0;i<24;i++) {
    setTimeout(()=>{
      const p=document.createElement('div'); p.className='particle';
      const sz=Math.random()*5+2;
      p.style.cssText=`left:${Math.random()*100}vw;bottom:-10px;width:${sz}px;height:${sz}px;background:${clrs[Math.floor(Math.random()*clrs.length)]};animation-duration:${9+Math.random()*10}s;animation-delay:${Math.random()*4}s;`;
      document.body.appendChild(p);
    },i*280);
  }
}

/* LOADING */
window.addEventListener('load',()=>{
  setTimeout(()=>{
    const ov=document.getElementById('loading-overlay');
    ov.classList.add('hidden');
    setTimeout(()=>{
      ov.remove();
      document.getElementById('main-container').style.display='block';
    },900);
  },1800);
});

/* BG SHIFT */
const bgs=['#0a0e1a','#0d1b3e','#0c2461','#0a1f5c','#122b6e','#0d2055','#0a1845','#091535'];
let bgI=0;
function nextBg(){ bgI=(bgI+1)%bgs.length; document.body.style.backgroundColor=bgs[bgI]; }

/* Helper to show next button and hide current */
let currentButtonId = 'btn-lights';
const buttonOrder = ['btn-lights', 'btn-play', 'btn-banner', 'btn-balloons', 'btn-cake', 'btn-candle', 'btn-wish-btn', 'btn-message'];

function showNextButton(currentId) {
  const currentIdx = buttonOrder.indexOf(currentId);
  const nextId = buttonOrder[currentIdx + 1];
  if (nextId) {
    document.getElementById(nextId).style.display = '';
  }
}

/* LIGHTS */
document.getElementById('btn-lights').addEventListener('click',function(){
  this.disabled=true; this.classList.add('active');
  document.body.style.backgroundColor='#0d1b3e';
  const bulbs=document.querySelectorAll('.bulb');
  bulbs.forEach((b,i)=>setTimeout(()=>b.classList.add('lit'),i*200));
  setTimeout(()=>{
    showNextButton('btn-lights');
    setInterval(nextBg,5500);
  },2000);
  this.style.display = 'none';
});

/* PLAY */
document.getElementById('btn-play').addEventListener('click',function(){
  this.disabled=true; this.classList.add('active');
  const s=document.getElementById('song'); s.volume=0.6; s.play().catch(()=>{});
  spawnParticles();
  setTimeout(()=>{
    showNextButton('btn-play');
  },700);
  this.style.display = 'none';
});

/* BANNER */
document.getElementById('btn-banner').addEventListener('click',function(){
  this.disabled=true; this.classList.add('active');
  document.getElementById('banner-img').classList.add('landed');
  setTimeout(()=>{
    showNextButton('btn-banner');
  },1300);
  this.style.display = 'none';
});

/* BALLOONS */
document.getElementById('btn-balloons').addEventListener('click',function(){
  this.disabled=true; this.classList.add('active');
  document.querySelectorAll('.balloons').forEach((b,i)=>{
    b.querySelector('h2').style.display='block';
    setTimeout(()=>{
      b.style.transition=`bottom ${2.4+i*0.12}s cubic-bezier(0.22,1,0.36,1), opacity 0.5s ease`;
      b.style.bottom=`${58+(i%3)*16}px`;
      b.style.opacity='0.82';
    },i*110);
  });
  document.getElementById('balloon-border').classList.add('risen');
  setTimeout(()=>{
    showNextButton('btn-balloons');
  },2200);
  this.style.display = 'none';
});

/* CAKE */
document.getElementById('btn-cake').addEventListener('click',function(){
  this.disabled=true; this.classList.add('active');
  const ck=document.getElementById('the-cake');
  ck.style.display='block'; ck.style.opacity='0'; ck.style.transition='opacity 1.2s ease';
  requestAnimationFrame(()=>ck.style.opacity='1');
  setTimeout(()=>{
    showNextButton('btn-cake');
  },1100);
  this.style.display = 'none';
});

/* CANDLE */
document.getElementById('btn-candle').addEventListener('click',function(){
  this.disabled=true; this.classList.add('active');
  document.querySelectorAll('.fuego').forEach(f=>f.style.display='block');
  setTimeout(()=>{
    showNextButton('btn-candle');
  },800);
  this.style.display = 'none';
});

/* WISH */
document.getElementById('btn-wish-btn').addEventListener('click',function(){
  this.disabled=true; this.classList.add('active');
  document.body.style.backgroundColor='#0c2461';
  setTimeout(()=>{
    showNextButton('btn-wish-btn');
  },600);
  this.style.display = 'none';
});

/* MESSAGE - LINE BY LINE WITH DISAPPEARING EFFECT */
document.getElementById('btn-message').addEventListener('click',function(){
  this.disabled=true; this.classList.add('active');
  this.style.display = 'none';
  
  const sec=document.getElementById('message-section');
  sec.style.display='block';
  setTimeout(()=>sec.scrollIntoView({behavior:'smooth'}),100);
  
  // Define all message lines
  const messageLinesArray = [
    "Today, the universe decided to celebrate",
    "the day you came into this world —",
    "and honestly, how could it not?",
    "Happy Birthday, Nicky. 💙",
    "",
    "I've been trying to find the right words",
    "to describe what you mean to me,",
    "and I keep running out of language.",
    "Because some people are simply beyond words.",
    "You are one of those people.",
    "",
    "You have this rare and beautiful gift —",
    "you make everyone around you feel seen,",
    "feel heard, feel safe.",
    "In a world that can be loud and unkind,",
    "you are a quiet and steady kind of warmth.",
    "The kind that stays.",
    "",
    "Thank you for every conversation,",
    "every word of encouragement you offered",
    "when I needed it most —",
    "even when you had your own storms to weather.",
    "That is who you are, Nicky.",
    "Someone who shows up. Every single time.",
    "",
    "Your kindness isn't performative.",
    "It is genuine, deep, and effortless.",
    "You care in ways most people have forgotten how to.",
    "And that is not a small thing.",
    "That is everything.",
    "",
    "The distance between us changes nothing.",
    "You are one of the most real friendships I have.",
    "Online or not, near or far,",
    "you have carved a place in my life",
    "that no one else could ever fill.",
    "",
    "On this birthday, I want you to feel",
    "every bit of the love you pour into others",
    "poured right back into you.",
    "I want you to rest in knowing",
    "that you are deeply, genuinely treasured —",
    "not for what you do,",
    "but simply for who you are.",
    "",
    "May this year bring you everything",
    "your beautiful heart deserves.",
    "Peace. Laughter. Abundance. Joy.",
    "May every good thing find its way to you.",
    "May you receive the same softness",
    "that you so freely give to everyone else.",
    "",
    "You deserve the whole sky, Nicky.",
    "Every star in it.",
    "Every shade of blue.",
    "",
    "Happy Birthday, my dearest friend. 💙",
    "With all the love in the world —",
    "always and always."
  ];
  
  const container = document.getElementById('message-lines-container');
  container.innerHTML = '';
  
  // Create span elements for each message line
  const lineElements = [];
  messageLinesArray.forEach((text, idx) => {
    const p = document.createElement('p');
    p.className = 'message-line';
    if (text === "") {
      p.className = 'message-line spacer';
      p.innerHTML = '&nbsp;';
    } else if (text.includes("Happy Birthday, Nicky") && !text.includes("dearest")) {
      p.className = 'message-line strong';
      p.textContent = text;
    } else if (text.includes("That is everything")) {
      p.className = 'message-line strong';
      p.textContent = text;
    } else if (text.includes("Happy Birthday, my dearest friend")) {
      p.className = 'message-line gold';
      p.textContent = text;
    } else if (text.includes("With all the love")) {
      p.style.cssText = 'color:rgba(106,176,255,0.65);font-size:16px;letter-spacing:2px;';
      p.textContent = text;
    } else {
      p.textContent = text;
    }
    container.appendChild(p);
    lineElements.push(p);
  });
  
  let currentIndex = 0;
  const displayDuration = 2200; // Time each line stays visible
  const fadeDuration = 500; // Time for fade transitions
  
  function showNextLine() {
    if (currentIndex >= lineElements.length) {
      // All lines done, show signature
      document.getElementById('msg-sig').style.display = 'block';
      return;
    }
    
    const currentLine = lineElements[currentIndex];
    
    // If it's a spacer, just mark as visible and move on quickly
    if (currentLine.classList.contains('spacer')) {
      currentLine.classList.add('visible');
      currentIndex++;
      setTimeout(showNextLine, 200);
      return;
    }
    
    // Show current line
    currentLine.classList.add('visible');
    
    // Set timeout to hide this line and show next
    setTimeout(() => {
      // Hide current line with fade out
      currentLine.classList.remove('visible');
      currentLine.classList.add('hiding');
      
      // After fade out, remove it from display
      setTimeout(() => {
        currentLine.style.display = 'none';
        currentLine.classList.remove('hiding');
        currentIndex++;
        // Show next line
        showNextLine();
      }, fadeDuration);
    }, displayDuration);
  }
  
  // Start showing lines
  setTimeout(showNextLine, 300);
});
</script>
